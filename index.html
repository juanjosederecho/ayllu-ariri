<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f766e" />
    <title>Ayllu Ariri</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="top-panel" aria-label="Presentación">
        <div>
          <p class="eyebrow">Seguridad escolar y comunitaria</p>
          <h1>Ayllu Ariri</h1>
          <p class="subtitle">Guardián de la comunidad</p>
        </div>
        <div class="score-chip" id="progressText">0/10</div>
      </section>

      <section class="screen active" id="startScreen">
        <div class="intro-band">
          <h2>Rosaspata, Huancané</h2>
          <p>Ingresa el nombre de un integrante para iniciar las preguntas.</p>
        </div>
        <form id="startForm" class="form-panel">
          <label for="studentName">Nombre del integrante</label>
          <input id="studentName" name="studentName" type="text" autocomplete="name" placeholder="Escribe un nombre" required />
          <button type="submit">Iniciar evaluación</button>
        </form>
      </section>

      <section class="screen" id="quizScreen" aria-live="polite">
        <div class="quiz-meta">
          <span id="studentBadge"></span>
          <span id="questionNumber"></span>
        </div>
        <article class="question-panel">
          <h2 id="questionText"></h2>
          <div class="answers" id="answers"></div>
        </article>
        <div class="actions">
          <button type="button" class="secondary" id="backBtn">Anterior</button>
          <button type="button" id="nextBtn">Siguiente</button>
        </div>
      </section>

      <section class="screen" id="resultScreen">
        <div class="result-panel">
          <p class="eyebrow">Resultado final</p>
          <h2 id="resultTitle"></h2>
          <p id="resultCopy"></p>
          <div class="result-grid">
            <div>
              <span class="result-label">Puntaje</span>
              <strong id="scoreValue"></strong>
            </div>
            <div>
              <span class="result-label">Integrante</span>
              <strong id="resultName"></strong>
            </div>
          </div>
        </div>

        <div class="review-panel">
          <h3>Respuestas correctas</h3>
          <div id="reviewList"></div>
        </div>

        <div class="qr-panel">
          <h3>QR de acceso</h3>
          <img id="qrImage" alt="Código QR para acceder a la aplicación" />
          <p id="appUrl"></p>
        </div>

        <button type="button" id="whatsappBtn" class="whatsapp-btn">Enviar resultados al profesor Juan</button>
        <div class="actions">
          <button type="button" class="secondary" id="restartBtn">Reiniciar</button>
          <button type="button" id="shareBtn">Compartir</button>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
